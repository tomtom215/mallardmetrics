# =============================================================================
# Mallard Metrics — Production Docker Compose
# =============================================================================
#
# Usage:
#   1. Copy deploy/.env.example → deploy/.env and fill in every value.
#   2. Run deploy/setup.sh to provision the host (LUKS, firewall, Docker).
#   3. From the repo root:
#        docker compose -f deploy/docker-compose.production.yml --env-file deploy/.env up -d
#
# Architecture:
#   Internet → caddy_external network → Caddy (TLS, reverse proxy)
#                                     → proxy network (internal-only)
#                                     → mallard-metrics (no internet access)
#
# Data is stored on the host at MALLARD_DATA_HOST_DIR (default: /srv/mallard/data).
# Run deploy/setup.sh first — it mounts that path on a LUKS-encrypted container.
# =============================================================================

name: mallard-production

# ---------------------------------------------------------------------------
# Services
# ---------------------------------------------------------------------------
services:

  # ── Caddy ─────────────────────────────────────────────────────────────────
  # Custom build that includes the Cloudflare DNS provider module so Caddy
  # can complete the ACME DNS-01 challenge (required for wildcard certs and
  # for servers behind NAT or with no inbound port 80).
  caddy:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.caddy
    image: mallard-caddy:latest
    container_name: mallard-caddy
    restart: unless-stopped

    # Drop all Linux capabilities; re-add only what's needed to bind 80/443.
    cap_drop: [ALL]
    cap_add: [NET_BIND_SERVICE]

    security_opt:
      - no-new-privileges:true

    # Read-only root FS. Caddy needs /tmp; /data and /config are named volumes.
    read_only: true
    tmpfs:
      - /tmp:size=32m,mode=1777

    # Caddy is on BOTH networks:
    #   caddy_external — faces the internet (ACME, incoming connections)
    #   proxy          — reaches Mallard on the internal network
    networks:
      - caddy_external
      - proxy

    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"   # HTTP/3 / QUIC

    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
      # Caddy access logs land beside mallard data so they rotate together.
      - ${MALLARD_DATA_HOST_DIR:-/srv/mallard/data}/logs:/logs

    environment:
      DOMAIN:               ${DOMAIN}
      ACME_EMAIL:           ${ACME_EMAIL}
      CLOUDFLARE_API_TOKEN: ${CLOUDFLARE_API_TOKEN}

    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "5"

    healthcheck:
      test: ["CMD", "caddy", "validate", "--config", "/etc/caddy/Caddyfile", "--adapter", "caddyfile"]
      interval: 60s
      timeout: 15s
      retries: 3
      start_period: 10s

  # ── Mallard Metrics ────────────────────────────────────────────────────────
  # The analytics backend. Built from the repo root Dockerfile (FROM scratch,
  # statically linked musl binary). No port is published to the host — all
  # traffic goes through Caddy on the internal `proxy` network.
  mallard:
    build:
      context: ..
      dockerfile: Dockerfile
    image: mallard-metrics:latest
    container_name: mallard-metrics
    restart: unless-stopped

    cap_drop: [ALL]
    security_opt:
      - no-new-privileges:true

    # FROM scratch has no shell, so read_only is effectively the default.
    # The only writable path is /data (bind-mounted from the LUKS volume).
    read_only: true

    # Mallard is ONLY on the internal network — it has no internet access.
    # Caddy reaches it via the shared `proxy` network; the internet cannot
    # reach Mallard directly even if Caddy is misconfigured.
    networks:
      - proxy

    volumes:
      # Bind-mount the LUKS-decrypted directory. setup.sh creates and mounts it.
      - type: bind
        source: ${MALLARD_DATA_HOST_DIR:-/srv/mallard/data}
        target: /data

    environment:
      MALLARD_DATA_DIR:  /data
      MALLARD_HOST:      0.0.0.0
      MALLARD_PORT:      8000

      # ---- Security (all required in production) ----
      MALLARD_SECRET:           ${MALLARD_SECRET}
      MALLARD_ADMIN_PASSWORD:   ${MALLARD_ADMIN_PASSWORD}
      MALLARD_DASHBOARD_ORIGIN: https://${DOMAIN}
      MALLARD_SECURE_COOKIES:   "true"
      MALLARD_METRICS_TOKEN:    ${MALLARD_METRICS_TOKEN}

      # ---- Behaviour ----
      # IMPORTANT: env var names must match config.rs exactly.
      # MALLARD_RATE_LIMIT       → config.rate_limit_per_site
      # MALLARD_CACHE_TTL        → config.cache_ttl_secs
      # MALLARD_GEOIP_DB         → config.geoip_db_path
      MALLARD_LOG_FORMAT:             json
      MALLARD_FILTER_BOTS:            "true"
      MALLARD_RETENTION_DAYS:         ${MALLARD_RETENTION_DAYS:-365}
      MALLARD_RATE_LIMIT:             ${MALLARD_RATE_LIMIT:-200}
      MALLARD_CACHE_TTL:              ${MALLARD_CACHE_TTL:-300}
      MALLARD_MAX_CONCURRENT_QUERIES: ${MALLARD_MAX_CONCURRENT_QUERIES:-10}
      MALLARD_MAX_LOGIN_ATTEMPTS:     ${MALLARD_MAX_LOGIN_ATTEMPTS:-5}
      MALLARD_LOGIN_LOCKOUT:          ${MALLARD_LOGIN_LOCKOUT:-300}

      RUST_LOG: "mallard_metrics=info,tower_http=warn"

    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "7"

    # FROM scratch has no executables for a shell-based health check.
    # Caddy performs active health checks against /health/ready instead.
    healthcheck:
      disable: true

    # Mallard does not depend on Caddy — it starts independently and accepts
    # connections as soon as it binds. Caddy's upstream health check marks
    # Mallard as "up" once /health/ready returns 200.
    # No depends_on here — either service can (re)start independently.

# ---------------------------------------------------------------------------
# Networks
# ---------------------------------------------------------------------------
networks:
  # Caddy-facing external network: allows outbound internet (ACME, DNS checks).
  # Only Caddy is on this network.
  caddy_external:
    driver: bridge
    internal: false

  # Internal-only network: Caddy ↔ Mallard communication.
  # internal: true means Docker does NOT add a default route to the host's
  # external interfaces, so Mallard cannot make outbound internet requests.
  # This limits blast radius if the Mallard container is ever compromised.
  proxy:
    driver: bridge
    internal: true

# ---------------------------------------------------------------------------
# Volumes
# ---------------------------------------------------------------------------
volumes:
  # Caddy uses these for ACME certificates and its internal config state.
  # Docker-managed named volumes (not on the LUKS data volume) so they survive
  # independent of the mallard data lifecycle.
  caddy-data:
    driver: local
  caddy-config:
    driver: local
