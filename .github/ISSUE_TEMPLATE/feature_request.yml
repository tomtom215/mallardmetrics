name: Feature Request
description: Propose a new feature or improvement for Mallard Metrics
title: "[Feature]: "
labels: ["enhancement", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for helping improve Mallard Metrics.

        Before submitting, please check:
        - [ROADMAP.md](https://github.com/tomtom215/mallardmetrics/blob/main/ROADMAP.md) — the feature may already be planned
        - Existing open issues — avoid duplicates

  - type: checkboxes
    id: preflight
    attributes:
      label: Pre-flight checklist
      options:
        - label: I searched existing issues and ROADMAP.md — this is not already tracked
          required: true
        - label: This feature fits the project's scope (self-hosted, privacy-focused analytics)
          required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: What problem does this feature solve? What is the current limitation?
      placeholder: "As an operator, I can't … because …"
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Describe the feature you'd like to see. Be as specific as possible.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you've considered and why you prefer the proposed solution.

  - type: dropdown
    id: area
    attributes:
      label: Feature area
      options:
        - Ingestion / tracking
        - Analytics queries
        - Dashboard UI
        - Authentication / API keys
        - Deployment / infrastructure
        - Performance / benchmarks
        - Documentation
        - CI / developer tooling
        - Other
    validations:
      required: true

  - type: dropdown
    id: contribution
    attributes:
      label: Willing to contribute?
      description: Would you be able to implement this feature yourself with guidance?
      options:
        - "Yes — I can submit a PR"
        - "Possibly — I'd need guidance"
        - "No — requesting only"
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Links, mockups, prior art, or any other relevant information.
